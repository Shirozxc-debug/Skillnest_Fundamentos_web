<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Formulario de registro (Core)</title>
</head>

<body>
    <h1>Crear una cuenta en Discord</h1>
    <form action="/registro" method="post">
        <br>
        <div>
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" required>
        </div>
        <br>
        <div>
            <label for="apellido">Apellido:</label>
            <input type="text" id="apellido" name="apellido" required>
        </div>
        <br>
        <div>
            <label for="correo_electronico">Correo electrónico:</label>
            <input type="text" id="correo_electronico" name="correo_electronico" required>
        </div>
        <br>
        <div>
            <label for="contraseña">Contraseña:</label>
            <input type="password" id="contraseña" name="contraseña" required>
        </div>
        <br>
        <div>
            <label for="confirmar_contraseña">Confrirmar contraseña:</label>
            <input type="password" id="confirmar_contraseña" name="confirmar_contraseña" required>
        </div>
        <br>
        <div>
            <label for="fecha_de_nacimiento">Fecha de nacimiento:</label>
            <input type="date" id="fecha_de_nacimiento" name="fecha_de_nacimiento" required>
        </div>
        <br>
        <div>
            <input type="radio" id="genero" name="genero">
            <label for="genero">Género:</label>
            <input type="radio" id="masculino" name="masculino">
            <label for="masculino">Masculino</label>
            <input type="radio" id="femenino" name="femenino" value="normal">
            <label for="femenino">Femenino</label>
            <input type="radio" id="prefiero_no_decirlo" name="prefiero_no_decirlo" value="normal">
            <label for="prefiero_no_decirlo">Prefiero no decirlo</label>
        </div>
        <br>
        <div>
            <label for="Descripcion_sobre_ti">Descripción sobre tí:</label><br>
            <textarea name="Descripcion_sobre_ti" id="Descripcion_sobre_ti"></textarea>
        </div>
        <br>
        <div>
            <label for="selecciona_tus_intereses">Selecciona tus intereses:</label><br>
            <select name="selecciona_tus_intereses" id="selecciona_tus_intereses">
                <option value="musica">Música</option>
                <option value="peliculas">Películas</option>
                <option value="deportes">Deperotes</option>
                <option value="tecnologia">Tecnología</option>
            </select>
        </div>
        <br>
        <div>
            <input type="checkbox" id="acepto" name="acepto">
            <label for="acepto">Al registrarte, aceptas los <a href="https://discord.com/terms">Términos y
                    condiciones</a> de Discord.</label>
        </div>
        <br>
        <div>
            <label for="registrarse"></label>
            <input type="submit" id="registrarse" value="registrarse">
        </div>
    </form>
</body>

</html>
