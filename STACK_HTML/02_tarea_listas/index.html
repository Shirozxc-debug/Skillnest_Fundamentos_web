<!--Crea una lista desordenada <ul> utilizando elementos de compra (ejemplo: furtas, etc.) (8 elementos)-->
<!--Crear una lista ordenada <ol> para tareas pendientes (8 elementos) (ejemplo:) Regar plantas. etc-->
    <!DOCTYPE html>
    <html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>
        <h1>Lista desordenada</h1>
        <ul>
            <li>Manzana</li>
            <li>Pera</li>
            <li>Durazno</li>
            <li>Plátano</li>
            <li>guinda</li>
            <li>Uva</li>
            <li>Piña</li>
            <li>Naranja</li>
        </ul>
        <hr>
        <h2>Lista ordenada</h2>
        <ol>
            <li>Salir con amigos</li>
            <li>Ir al cine</li>
            <li>Salir a pasear</li>
            <li>Hacer tareas</li>
            <li>Ordenar la casa</li>
            <li>jugar con el perro</li>
            <li>salir de compras</li>
            <li>darle comida a las mascotas</li>
        </ol>
    </body>
    </html>
